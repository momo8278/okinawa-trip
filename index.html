  <script type="text/babel" data-type="module" data-presets="react">
    import React, { useState, useEffect, useRef, useCallback } from 'react';

    import {

    // ── Firebase Realtime Database 同步層 ────────────────────────────
    // ★ 請填入你的 Firebase 專案設定
    //   （Firebase Console → 專案設定 → 一般 → 你的應用程式 → SDK 設定與配置）
    const firebaseConfig = {
      apiKey:            "AIzaSyDSp2clYnTev-2b1A_XK8E_YaAmaq2_SGs",
      authDomain:        "okinawa-trip-69ea4.firebaseapp.com",
      databaseURL:       "https://okinawa-trip-69ea4-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId:         "okinawa-trip-69ea4",
      storageBucket:     "okinawa-trip-69ea4.firebasestorage.app",
      messagingSenderId: "657851490589",
      appId:             "1:657851490589:web:b40c1de29b1083b3c7c1f4"
    };
    let fdb = null;
    try {
      firebase.initializeApp(firebaseConfig);
      fdb = firebase.database();
    } catch (e) { console.warn('Firebase 尚未設定，目前僅本機模式可用：', e.message); }

    const ROOM_PREFIX = 'trip26v1-';
    let roomRef = null;
    const fbListeners = {}; // key → { ref, handler }

    const joinRoom = (code) => { if (!fdb) return; roomRef = fdb.ref('rooms/' + ROOM_PREFIX + code); };

    const leaveRoom = () => {
      Object.values(fbListeners).forEach(l => l && l.ref.off('value', l.handler));
      Object.keys(fbListeners).forEach(k => delete fbListeners[k]);
      roomRef = null;
    };

    // 訂閱房間某個 key（資料以 JSON 字串存放，保留陣列順序）
    const gunSubscribe = (key, cb) => {
      if (!roomRef) return () => {};
      const ref = roomRef.child(key);
      const handler = ref.on('value', snap => {
        const v = snap.val();
        if (v == null) return;
        try { cb(JSON.parse(v)); } catch {}
      });
      fbListeners[key] = { ref, handler };
      return () => { ref.off('value', handler); delete fbListeners[key]; };
    };

    const gunPut = (key, data) => {
      if (!roomRef) return;
      roomRef.child(key).set(JSON.stringify(data));
    };

    // ── localStorage 備份 ─────────────────────────────────────────────
    const LS = { itinerary:'ok26_i', expenses:'ok26_e', packing:'ok26_p', gifts:'ok26_g', safety:'ok26_s', settings:'ok26_cfg', funpass:'ok26_fp' };
    const lsGet = (k, fb) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : fb; } catch { return fb; } };
    const lsSet = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };
    const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
    const todayStr = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
    const fmtDate  = (s) => { if (!s) return '未分類'; const p = s.split('-'); return `${+p[1]}/${+p[2]}`; };
    const readCompressedImage = (file, cb) => {
      const reader = new FileReader();
      reader.onload = ev => {
        const img = new Image();
        img.onload = () => {
          const c = document.createElement('canvas');
          let w = img.width, h = img.height; const M = 800;
          if (w > h && w > M) { h = h * M / w; w = M; } else if (h > M) { w = w * M / h; h = M; }
          c.width = w; c.height = h;
          c.getContext('2d').drawImage(img, 0, 0, w, h);
          cb(c.toDataURL('image/jpeg', 0.7));
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    };

    // ── 預設資料 ──────────────────────────────────────────────────────
    const DEFAULT_ITINERARY = [

        { id:'d1s1', time:"14:00", name:"那霸機場",  note:"辦理取車，帶駕照正本與譯本", type:"transport", isIndoor:true,  mapcode:"33 123 331*85" },
        { id:'d1s2', time:"14:30", name:"瀨長島",    note:"純白建築配海景漫步",           type:"view",      isIndoor:false, mapcode:"33 002 602*00" },
        { id:'d1s3', time:"15:30", name:"PARCO CITY",note:"沖繩大型商場購物",             type:"shopping",  isIndoor:true,  mapcode:"33 339 040*11" },
        { id:'d1s4', time:"17:00", name:"美國村",    note:"異國風情夕陽與晚餐",           type:"shopping",  isIndoor:false, mapcode:"33 526 450*63" },
      ]},
      { day:2, title:"北部探索", summary:"美麗海水族館鯨鯊與名護排隊美食", spots:[
        { id:'d2s1', time:"09:00", name:"美麗海水族館",  note:"必看大鯨鯊餵食秀",   type:"park",  isIndoor:true,  mapcode:"553 075 797*77", attachment:"https://churaumi.okinawa/tc/userfiles/images/guide/access/tyuusyajyo_tc20250422.png" },
        { id:'d2s2', time:"12:00", name:"暖暮拉麵 名護店",note:"經典九州豚骨拉麵",  type:"food",  isIndoor:true,  mapcode:"206 657 746*82" },
        { id:'d2s3', time:"13:00", name:"古宇利島",      note:"過大橋看心型岩",    type:"view",  isIndoor:false, mapcode:"485 692 108*11" },
        { id:'d2s4', time:"16:00", name:"萬座毛",        note:"珊瑚礁斷崖絕景",   type:"view",  isIndoor:false, mapcode:"206 312 038*55" },
      ]},
      { day:3, title:"親子同樂", summary:"殘波岬海景與沖繩兒童王國放電", spots:[
        { id:'d3s1', time:"09:00", name:"殘波岬燈塔",  note:"壯闊斷崖地景",          type:"view", isIndoor:false, mapcode:"1005 685 296*44" },
        { id:'d3s2', time:"09:30", name:"沖繩兒童王國",note:"親子動物園與博物館",      type:"park", isIndoor:false, mapcode:"33 592 485*33" },
        { id:'d3s3', time:"15:00", name:"美國村",      note:"午後補貨與悠閒時光",      type:"shopping", isIndoor:false, mapcode:"33 526 450*63" },
        { id:'d3s4', time:"18:00", name:"國際通",      note:"那霸熱鬧街區晚餐",        type:"shopping", isIndoor:false, mapcode:"33 157 382*11" },
      ]},
      { day:4, title:"文化巡禮", summary:"玉泉洞地底奇觀與那霸購物", spots:[
        { id:'d4s1', time:"09:00", name:"玉泉洞",              note:"神秘地底鐘乳石洞",   type:"view",     isIndoor:true,  mapcode:"232 495 330*28" },
        { id:'d4s2', time:"10:00", name:"沖繩世界",            note:"民俗村文化體驗",     type:"park",     isIndoor:false, mapcode:"232 495 330*28" },
        { id:'d4s3', time:"13:00", name:"西來院達摩寺",        note:"求安產育兒之古寺",   type:"view",     isIndoor:false, mapcode:"33 191 106*33" },
        { id:'d4s4', time:"14:00", name:"San-A Naha Main Place",note:"在地大型超市百貨",  type:"shopping", isIndoor:true,  mapcode:"33 188 559*22" },
      ]},
      { day:5, title:"最後採買", summary:"國際通補貨後前往機場", spots:[
        { id:'d5s1', time:"10:00", name:"國際通",  note:"藥妝、零食最後補貨",  type:"shopping",  isIndoor:false, mapcode:"33 157 382*11" },
        { id:'d5s2', time:"13:00", name:"那霸機場",note:"還車並辦理登機",       type:"transport", isIndoor:true,  mapcode:"33 123 331*85" },
      ]},
    ];
    const DEFAULT_PACKING = [
      { id:uid(), name:"護照",                    category:"文件", checked:false },
      { id:uid(), name:"台灣駕照正本 (自駕必帶)", category:"文件", checked:false },
      { id:uid(), name:"日文譯本 (搭配正本使用)", category:"文件", checked:false },
      { id:uid(), name:"日幣現金",                category:"財務", checked:false },
      { id:uid(), name:"Suica / ICOCA",           category:"財務", checked:false },
      { id:uid(), name:"行動電源 (導航很耗電)",   category:"電器", checked:false },
      { id:uid(), name:"常用隨身藥品",            category:"生活", checked:false },
      { id:uid(), name:"薄外套 (室內強冷氣)",     category:"生活", checked:false },
      { id:uid(), name:"兒童安全座椅確認",        category:"親子", checked:false },
    ];
    const DEFAULT_GIFTS = [
      { id:uid(), name:'沖繩泡麵' }, { id:uid(), name:'紅芋塔' },
      { id:uid(), name:'雪鹽金楚糕' }, { id:uid(), name:'黑糖' }, { id:uid(), name:'風獅爺裝飾' },
    ];

    const MONORAIL = [
      { id:1, name:"那霸機場", key:true }, { id:2, name:"赤嶺" }, { id:3, name:"小祿" },
      { id:4, name:"奧武山公園" }, { id:5, name:"縣廳前", key:true }, { id:6, name:"美榮橋", key:true },
      { id:7, name:"牧志", key:true }, { id:8, name:"首里", key:true }, { id:9, name:"浦西", key:true },
    ];

    const CURRENCIES = [
      { code:'JPY', symbol:'¥', name:'日圓' }, { code:'KRW', symbol:'₩', name:'韓元' },
      { code:'THB', symbol:'฿', name:'泰銖' }, { code:'HKD', symbol:'HK$', name:'港幣' },
      { code:'USD', symbol:'$', name:'美金'  }, { code:'EUR', symbol:'€', name:'歐元'  },
    ];

    const MS_JH = '"Microsoft JhengHei","微軟正黑體",sans-serif';

    // ── FunPASS 可用景點 ──
    const FUNPASS_SPOTS = {
      '水族館・樂園': ['美麗海水族館', 'DMM Kariyushi 水族館', 'Little Universe OKINAWA'],
      '自然・動植物': ['名護動植物園', '東南植物樂園', '名護鳳梨園', '沖繩水果樂園', 'DINO 恐龍 PARK', '萬座毛'],
      '文化・古蹟':   ['沖繩世界(玉泉洞)', '琉球村', '首里城公園', '勝連城跡', '沖繩兒童王國', '古宇利海洋塔'],
      '體驗・活動':   ['CAVE OKINAWA 鐘乳洞', '南城溫泉 猿人之湯', '國際通 電動腳踏車', 'Triple Marine 水上活動'],
    };
    // 比對用關鍵字（景點名含任一即視為可兌換）
    const FUNPASS_KEYWORDS = ['美麗海', 'DMM', 'Kariyushi', 'Little Universe', '名護動植物', '東南植物', '鳳梨園', '水果樂園', '恐龍', '萬座毛', '玉泉洞', '沖繩世界', '琉球村', '首里城', '勝連城', '兒童王國', '古宇利海洋塔', 'CAVE', '猿人之湯', '電動腳踏車', 'Triple Marine'];
    const isFunpassSpot = (name) => !!name && FUNPASS_KEYWORDS.some(k => name.includes(k));
    const FUNPASS_MAP = 'https://cdn.fontrip.com/fontour/file/show/6KoVm/1200x800.jpg';

    const WeatherIcon = ({ code }) => {
      if (code === 0)  return <Sun size={12} className="text-amber-400" />;
      if (code < 4)   return <Cloud size={12} className="text-slate-300" />;
      if (code < 70)  return <CloudDrizzle size={12} className="text-blue-300" />;
      return <CloudLightning size={12} className="text-indigo-400" />;
    };

    const SpotIcon = ({ type }) => {
      const icons = { transport:<TramFront size={16}/>, food:<UtensilsCrossed size={16}/>, shopping:<ShoppingBasket size={16}/>, park:<Car size={16}/>, hotel:<Hotel size={16}/> };
      return icons[type] || <Camera size={16}/>;
    };

    // ── 主 App ────────────────────────────────────────────────────────
    function App() {
      // ── 房間狀態 ──
      const [roomCode,    setRoomCode]    = useState(() => window.location.hash.slice(1) || '');
      const [syncMode,    setSyncMode]    = useState(() => !!window.location.hash.slice(1));
      const [syncStatus,  setSyncStatus]  = useState('offline'); // offline | syncing | online
      const [showRoomUI,  setShowRoomUI]  = useState(false);
      const [codeInput,   setCodeInput]   = useState('');
      const [copied,      setCopied]      = useState(false);
      const [pendingJoin, setPendingJoin] = useState(null); // { code, hasData, checking }

      // ── 資料狀態 ──
      const [itinerary,   setItinerary]   = useState(() => lsGet(LS.itinerary, DEFAULT_ITINERARY));
      const [expenses,    setExpenses]    = useState(() => lsGet(LS.expenses,  []));
      const [packingList, setPackingList] = useState(() => lsGet(LS.packing,   DEFAULT_PACKING));
      const [gifts,       setGifts]       = useState(() => lsGet(LS.gifts,     DEFAULT_GIFTS));
      const [safetyNotes, setSafetyNotes] = useState(() => lsGet(LS.safety,    []));
      const [funpass,     setFunpass]     = useState(() => lsGet(LS.funpass,   []));
      const [settings,    setSettings]    = useState(() => lsGet(LS.settings,  { title:"沖繩", year:"2026", month:"June", currency:"JPY" }));
      const [exchangeRate,setExchangeRate]= useState(0.21);
      const [weather,     setWeather]     = useState({ temp:'--', code:0 });

      // ── UI 狀態 ──
      const [activeTab,  setActiveTab]  = useState('itinerary');
      const [activeDay,  setActiveDay]  = useState(1);
      const [rainyMode,  setRainyMode]  = useState(false);
      const [toast,      setToastMsg]   = useState('');
      const [showAdd,    setShowAdd]    = useState(false);
      const [editing,    setEditing]    = useState(null);
      const [attachment, setAttachment] = useState(null);
      const [showCfg,    setShowCfg]    = useState(false);
      const [zoom,       setZoom]       = useState(1);
      const [delDay,     setDelDay]     = useState(null);
      const [newSpot,    setNewSpot]    = useState({ time:"10:00", name:'', note:'', isIndoor:false, type:'view', mapcode:'', attachment:'' });
      const [newExp,     setNewExp]     = useState({ note:'', jpy:'', date: todayStr(), pay:'cash' });
      const [editDayInfo,setEditDayInfo]= useState(null);
      const [dragId,     setDragId]     = useState(null);
      const [newItem,    setNewItem]    = useState({ name:'', category:'生活' });
      const [newGift,    setNewGift]    = useState('');
      const [newSafety,  setNewSafety]  = useState('');
      const [newPassName,setNewPassName]= useState('');
      const [showMap,    setShowMap]    = useState(false);
      const [showSpotList,setShowSpotList]= useState(false);
      const [convA,      setConvA]      = useState('');
      const [convB,      setConvB]      = useState('');

      const syncRef = useRef(false); // prevent echo on own writes

      const showToast = (msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 2500); };

      // ── 天氣 & 匯率 ──
      useEffect(() => {
        fetch('https://api.open-meteo.com/v1/forecast?latitude=26.2124&longitude=127.6809&current_weather=true')
          .then(r => r.json()).then(d => { if (d.current_weather) setWeather({ temp: Math.round(d.current_weather.temperature), code: d.current_weather.weathercode }); })
          .catch(() => {});
      }, []);

      useEffect(() => {
        fetch(`https://open.er-api.com/v6/latest/${settings.currency}`)
          .then(r => r.json()).then(d => { if (d.rates?.TWD) setExchangeRate(d.rates.TWD); })
          .catch(() => {});
      }, [settings.currency]);

      // ── Firebase 訂閱 ──
      useEffect(() => {
        if (!syncMode || !roomCode) return;
        joinRoom(roomCode);
        setSyncStatus('syncing');

        // 記帳（expenses）不同步 — 僅存本機，保有個人隱私
        const unsubs = [
          gunSubscribe('itinerary', d => { if (!syncRef.current) { setItinerary(d); lsSet(LS.itinerary, d); } }),
          gunSubscribe('packing',   d => { if (!syncRef.current) { setPackingList(d); lsSet(LS.packing, d); } }),
          gunSubscribe('gifts',     d => { if (!syncRef.current) { setGifts(d);     lsSet(LS.gifts,    d); } }),
          gunSubscribe('safety',    d => { if (!syncRef.current) { setSafetyNotes(d); lsSet(LS.safety, d); } }),
          gunSubscribe('settings',  d => { if (!syncRef.current) { setSettings(d);  lsSet(LS.settings, d); } }),
          gunSubscribe('funpass',   d => { if (!syncRef.current) { setFunpass(d);   lsSet(LS.funpass,  d); } }),
        ];

        // 用 Firebase 內建連線狀態，準確反映 online / 重連中
        let connRef = null, connHandler = null;
        if (fdb) {
          connRef = fdb.ref('.info/connected');
          connHandler = connRef.on('value', s => setSyncStatus(s.val() ? 'online' : 'syncing'));
        }

        return () => {
          unsubs.forEach(fn => fn());
          if (connRef) connRef.off('value', connHandler);
          leaveRoom();
          setSyncStatus('offline');
        };
      }, [syncMode, roomCode]);

      // ── 統一儲存 helper（localStorage + Gun）──
      const save = useCallback((key, lsKey, setter, data) => {
        setter(data);
        lsSet(lsKey, data);
        if (syncMode && roomRef) {
          syncRef.current = true;
          gunPut(key, data);
          setTimeout(() => { syncRef.current = false; }, 300);
        }
      }, [syncMode]);

      const saveItinerary   = d => save('itinerary', LS.itinerary, setItinerary,   d);
      const saveExpenses    = d => { setExpenses(d); lsSet(LS.expenses, d); }; // 僅存本機，不同步
      const savePacking     = d => save('packing',   LS.packing,   setPackingList, d);
      const saveGifts       = d => save('gifts',     LS.gifts,     setGifts,       d);
      const saveSafety      = d => save('safety',    LS.safety,    setSafetyNotes, d);
      const saveSettings    = d => save('settings',  LS.settings,  setSettings,    d);
      const saveFunpass     = d => save('funpass',   LS.funpass,   setFunpass,     d);

      // ── 加入 / 離開房間 ──
      // 把目前本機資料推送到房間（建立新房間 / 加入空房間時用）
      const pushLocalToRoom = () => {
        gunPut('itinerary', itinerary);
        gunPut('packing',   packingList);
        gunPut('gifts',     gifts);
        gunPut('safety',    safetyNotes);
        gunPut('settings',  settings);
        gunPut('funpass',   funpass);
      };

      // ── FunPASS 票券 ──
      const addPassMember = () => {
        if (!newPassName.trim()) return;
        saveFunpass([...funpass, { id: uid(), name: newPassName.trim(), qr: '' }]);
        setNewPassName('');
        showToast("已新增旅伴");
      };
      const setPassQr = (id, url) => saveFunpass(funpass.map(p => p.id === id ? { ...p, qr: url } : p));
      const removePassMember = (id) => saveFunpass(funpass.filter(p => p.id !== id));

      // 正式加入房間（已確認）。isNew=true 代表空房間，需上傳本機資料當起始
      const enterRoom = (c, isNew) => {
        setRoomCode(c);
        setSyncMode(true);
        window.location.hash = c;
        setShowRoomUI(false);
        setPendingJoin(null);
        showToast(`已加入房間 ${c}`);
        if (isNew) setTimeout(pushLocalToRoom, 600); // 只有空房間才推送，避免覆蓋旅伴資料
      };

      // 點「加入」：先偵測房間是否已有資料，再決定彈窗內容
      const doJoinRoom = (code) => {
        const c = code.trim().toLowerCase().replace(/[^a-z0-9]/g, '').slice(0, 12);
        if (!c) return;
        setPendingJoin({ code: c, checking: true });
        let done = false;
        const finish = (hasData) => { if (!done) { done = true; setPendingJoin({ code: c, hasData }); } };
        if (!fdb) { finish(false); return; }
        fdb.ref('rooms/' + ROOM_PREFIX + c + '/itinerary').once('value', snap => finish(snap.val() != null));
        setTimeout(() => finish(false), 3000); // 逾時視為空房間
      };

      // 建立新房間：代碼為隨機，必為空，直接加入並上傳本機資料
      const doCreateRoom = () => {
        const c = Math.random().toString(36).slice(2, 8);
        enterRoom(c, true);
      };

      const doLeaveRoom = () => {
        leaveRoom();
        setSyncMode(false);
        setRoomCode('');
        window.location.hash = '';
        setShowRoomUI(false);
        showToast('已切換為本機模式');
      };

      const copyLink = () => {
        const url = window.location.href.split('#')[0] + '#' + roomCode;
        navigator.clipboard.writeText(url).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); });
      };

      // ── 行程操作 ──
      const addDay = () => {
        const n = itinerary.length > 0 ? Math.max(...itinerary.map(d => d.day)) + 1 : 1;
        saveItinerary([...itinerary, { day:n, title:`Day ${n}`, summary:"點擊『ADD STOP』開始規劃", spots:[] }]);
        setActiveDay(n);
        showToast(`已新增第 ${n} 天`);
      };

      const confirmDelDay = () => {
        const rem = itinerary.filter(d => d.day !== delDay);
        saveItinerary(rem);
        setDelDay(null);
        showToast(`已刪除第 ${delDay} 天`);
        if (rem.length > 0) setActiveDay(rem[0].day);
      };

      const addSpot = () => {
        if (!newSpot.name) return;
        const ns = { ...newSpot, id:uid() };
        const updated = itinerary.map(d => {
          if (d.day !== activeDay) return d;
          const spots = [...d.spots];
          let idx = spots.findIndex(s => s.time > ns.time); // 依時間找插入點，之後可手動拖曳
          if (idx === -1) idx = spots.length;
          spots.splice(idx, 0, ns);
          return { ...d, spots };
        });
        saveItinerary(updated);
        setShowAdd(false);
        setNewSpot({ time:"10:00", name:'', note:'', isIndoor:false, type:'view', mapcode:'', attachment:'' });
        showToast("行程已新增");
      };

      const saveEditSpot = () => {
        if (!editing?.name) return;
        // 不重新排序，保留目前手動順序
        const updated = itinerary.map(d => d.day !== activeDay ? d : { ...d, spots: d.spots.map(s => s.id===editing.id ? editing : s) });
        saveItinerary(updated);
        setEditing(null);
        showToast("行程已更新");
      };

      const deleteSpot = (id) => {
        saveItinerary(itinerary.map(d => d.day !== activeDay ? d : { ...d, spots: d.spots.filter(s => s.id !== id) }));
      };

      // ── 拖曳排序 ──
      const itinRef = useRef(itinerary);
      useEffect(() => { itinRef.current = itinerary; });

      const commitItinerary = () => {
        const data = itinRef.current;
        lsSet(LS.itinerary, data);
        if (syncMode && roomRef) { syncRef.current = true; gunPut('itinerary', data); setTimeout(() => { syncRef.current = false; }, 300); }
      };

      const moveSpot = (fromId, toIndex) => setItinerary(prev => {
        let changed = false;
        const next = prev.map(d => {
          if (d.day !== activeDay) return d;
          const spots = [...d.spots];
          const from = spots.findIndex(s => s.id === fromId);
          if (from === -1 || toIndex < 0 || toIndex >= spots.length || from === toIndex) return d;
          const [m] = spots.splice(from, 1);
          spots.splice(toIndex, 0, m);
          changed = true;
          return { ...d, spots };
        });
        return changed ? next : prev;
      });

      useEffect(() => {
        if (!dragId) return;
        const move = (e) => {
          const rows = Array.from(document.querySelectorAll('[data-spot-row]'));
          let target = rows.length - 1;
          for (let i = 0; i < rows.length; i++) {
            const r = rows[i].getBoundingClientRect();
            if (e.clientY < r.top + r.height / 2) { target = i; break; }
          }
          moveSpot(dragId, target);
        };
        const up = () => { commitItinerary(); setDragId(null); };
        window.addEventListener('pointermove', move);
        window.addEventListener('pointerup', up);
        window.addEventListener('pointercancel', up);
        return () => { window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); window.removeEventListener('pointercancel', up); };
      }, [dragId, activeDay]);

      // ── 記帳 ──
      const addExpense = () => {
        if (!newExp.jpy) return;
        const cur = CURRENCIES.find(c => c.code === settings.currency) || CURRENCIES[0];
        saveExpenses([{ id:uid(), note:newExp.note, jpy:parseFloat(newExp.jpy), twd:Math.round(parseFloat(newExp.jpy)*exchangeRate), currency:cur.code, date:newExp.date || todayStr(), pay:newExp.pay || 'cash', time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}), ts:Date.now() }, ...expenses]);
        setNewExp({ note:'', jpy:'', date: newExp.date, pay: newExp.pay });
        showToast("記帳已新增");

      const saveDayInfo = () => {
        if (!editDayInfo) return;
        saveItinerary(itinerary.map(d => d.day === editDayInfo.day ? { ...d, title: editDayInfo.title, summary: editDayInfo.summary, flight: editDayInfo.flight || {} } : d));
        setEditDayInfo(null);
        showToast("天數資訊已更新");

      // ── 清單 ──
      const handleImageUpload = (e, setFn, cur) => {
        const file = e.target.files[0]; if (!file) return;
        showToast("圖片處理中...");
        const reader = new FileReader();
        reader.onload = ev => {
          const img = new Image();
          img.onload = () => {
            const c = document.createElement('canvas');
            let w = img.width, h = img.height, M = 800;
            if (w > h && w > M) { h=h*M/w; w=M; } else if (h>M) { w=w*M/h; h=M; }
            c.width=w; c.height=h; c.getContext('2d').drawImage(img,0,0,w,h);
            setFn({ ...cur, attachment: c.toDataURL('image/jpeg',0.6) });
            showToast("圖片已附加");
          };
          img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
      };

      const todaySpots = itinerary.find(d => d.day === activeDay)?.spots || [];

        const g = {};
        expenses.forEach(e => { const k = e.date || ''; (g[k] = g[k] || []).push(e); });

                    <div className="flex items-center gap-2 min-w-0">
                      <span className="bg-[#D1A44B] text-white text-[10px] px-2 py-0.5 rounded-full font-bold uppercase shrink-0">Day {activeDay}</span>
                      <span className="text-xs font-bold text-[#5A4D3D] truncate">{itinerary.find(d=>d.day===activeDay)?.title}</span>
                    </div>
                    <div className="flex gap-2 shrink-0">
                      <button onClick={() => { const d = itinerary.find(x=>x.day===activeDay); setEditDayInfo({ day:activeDay, title:d?.title||'', summary:d?.summary||'', flight:d?.flight||{} }); }} className="p-1 text-slate-300 hover:text-[#1B2B5D] transition-colors"><Edit2 size={16}/></button>
                      <button onClick={() => setDelDay(activeDay)} className="p-1 text-slate-300 hover:text-red-500 transition-colors"><Trash2 size={16}/></button>
                      <button onClick={() => setRainyMode(!rainyMode)} className={`p-1 transition-colors ${rainyMode ? 'text-blue-500' : 'text-slate-300'}`}><CloudRain size={16}/></button>
                    </div>
                  </div>
                  <div className="p-4 text-xs text-[#5A4D3D] leading-relaxed italic">★ {itinerary.find(d=>d.day===activeDay)?.summary}</div>
                </div>

                {(() => {

                  return (
                    <div className="rounded-2xl overflow-hidden shadow-lg border border-[#8E1E7E]/20">

                        </div>

                        <div className="min-w-0 flex-1 text-right">

                          <p className="text-xs font-black text-[#1B2B5D] tracking-tight">{f.arrTime}</p>
                        </div>
                      </div>
                      {(f.pnr || f.qr) && (

                          {f.qr && <button onClick={()=>setAttachment(f.qr)} className="bg-[#8E1E7E] text-white text-[10px] px-3 py-1 rounded-lg flex items-center gap-1 font-bold active:scale-95 shadow-sm"><Paperclip size={11}/> 登機 QR</button>}

                  {todaySpots.map((spot, idx) => (

                      <div className="absolute -left-[30px] top-1 w-8 h-8 rounded-full flex items-center justify-center border-4 border-white shadow-sm bg-[#B91C1C]">

                          </div>

                </div>

            {activeTab === 'expenses' && (

              <div className="bg-white w-full max-w-md rounded-t-[2rem] p-6 shadow-2xl animate-in slide-in-from-bottom-4 duration-300">

                  <button onClick={() => setShowRoomUI(false)} className="bg-slate-100 p-2 rounded-full text-slate-400"><X size={18}/></button>
                </div>

                {syncMode ? (
                  <div className="space-y-4">
                    {/* 已在房間 */}
                    <div className="bg-[#F8F3E9] rounded-2xl p-4 border border-[#E9E1D3]">
                      <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1 leading-none">目前房間代碼</p>
                      <p className="text-3xl font-serif font-black text-[#1B2B5D] tracking-[0.15em] uppercase">{roomCode}</p>
                      <div className={`flex items-center gap-1.5 mt-1 ${syncStatus==='online'?'text-emerald-500':'text-amber-500'}`}>
                        {syncStatus==='online' ? <Wifi size={12}/> : <WifiOff size={12}/>}
                        <span className="text-[9px] font-bold uppercase">{syncStatus==='online'?'已連線，即時同步中':'連線中...'}</span>
                      </div>
                    </div>
                    <button onClick={copyLink} className={`w-full flex items-center justify-center gap-2 py-3 rounded-2xl font-black text-sm uppercase tracking-widest transition-all active:scale-95 ${copied ? 'bg-emerald-500 text-white' : 'bg-[#1B2B5D] text-white shadow-lg'}`}>

                    </button>
                    <p className="text-[10px] text-slate-400 text-center leading-relaxed">將連結傳給旅伴，對方點開即可共同編輯</p>
                    <button onClick={doLeaveRoom} className="w-full flex items-center justify-center gap-2 py-3 rounded-2xl font-black text-xs uppercase tracking-widest bg-slate-100 text-slate-500 active:scale-95 transition-all">
                      <LogOut size={14}/> 退出共享，切換回本機模式
                    </button>
                  </div>
                ) : (
                  <div className="space-y-4">
                    {/* 未在房間 */}
                    <button onClick={doCreateRoom} className="w-full bg-[#1B2B5D] text-white py-4 rounded-2xl font-black uppercase tracking-widest shadow-xl active:scale-95 transition-all flex items-center justify-center gap-2">
                      <Plus size={20}/> 建立新共享房間
                    </button>
                    <div className="relative flex items-center gap-3">
                      <div className="flex-1 h-px bg-[#E9E1D3]"></div>
                      <span className="text-[9px] font-black text-slate-300 uppercase tracking-widest">或加入現有房間</span>
                      <div className="flex-1 h-px bg-[#E9E1D3]"></div>
                    </div>
                    <div className="flex gap-2">
                      <input type="text" placeholder="輸入房間代碼..." className="flex-1 bg-[#F8F3E9] p-3 rounded-2xl text-sm font-bold outline-none border border-transparent focus:border-[#D1A44B] uppercase tracking-widest" value={codeInput} onChange={e=>setCodeInput(e.target.value.toUpperCase())} onKeyDown={e=>e.key==='Enter'&&doJoinRoom(codeInput)} maxLength={12}/>
                      <button onClick={() => doJoinRoom(codeInput)} className="bg-[#D1A44B] text-white px-4 rounded-2xl font-black shadow-md active:scale-95 transition-all text-sm uppercase tracking-wider">加入</button>
                    </div>
                    <p className="text-[10px] text-slate-400 text-center leading-relaxed">資料儲存在公共中繼伺服器<br/>知道房間代碼的人均可存取</p>
                  </div>
                )}
              </div>
            </div>
          )}

          {/* 加入房間衝突確認 */}
          {pendingJoin && (
            <div className="absolute inset-0 z-[700] flex items-center justify-center p-6 bg-slate-900/70 backdrop-blur-md animate-in fade-in duration-300">
              <div className="bg-white w-full max-w-sm rounded-[2rem] p-8 shadow-2xl border-4 border-[#1B2B5D] animate-in zoom-in-95 text-center">
                {pendingJoin.checking ? (
                  <>
                    <RefreshCw size={40} className="text-[#1B2B5D] mx-auto mb-4 animate-spin" />
                    <p className="text-sm font-bold text-slate-500">正在偵測房間 <span className="uppercase tracking-widest text-[#1B2B5D]">{pendingJoin.code}</span>...</p>
                  </>
                ) : pendingJoin.hasData ? (
                  <>
                    <Cloud size={44} className="text-[#D1A44B] mx-auto mb-3" />
                    <h3 className="text-xl font-serif font-bold uppercase font-black leading-none text-[#1B2B5D] mb-2">加入現有房間</h3>
                    <p className="text-sm text-slate-500 mb-1 font-bold">房間「<span className="uppercase tracking-widest text-[#B91C1C]">{pendingJoin.code}</span>」已有共享行程</p>
                    <p className="text-xs text-slate-400 mb-6 leading-relaxed">加入後將<b className="text-[#1B2B5D]">載入房間的內容</b>，您目前畫面的規劃不會上傳到房間。</p>
                    <div className="flex gap-3">
                      <button onClick={() => setPendingJoin(null)} className="flex-1 bg-slate-100 text-slate-600 font-black py-3 rounded-2xl active:scale-95 transition-all uppercase tracking-widest leading-none">取消</button>
                      <button onClick={() => enterRoom(pendingJoin.code, false)} className="flex-1 bg-[#1B2B5D] text-white font-black py-3 rounded-2xl shadow-xl active:scale-95 transition-all uppercase tracking-widest leading-none">載入並加入</button>
                    </div>
                  </>
                ) : (
                  <>
                    <Cloud size={44} className="text-[#1B2B5D] mx-auto mb-3" />
                    <h3 className="text-xl font-serif font-bold uppercase font-black leading-none text-[#1B2B5D] mb-2">加入房間</h3>
                    <p className="text-sm text-slate-500 mb-1 font-bold">房間「<span className="uppercase tracking-widest text-[#B91C1C]">{pendingJoin.code}</span>」目前偵測不到資料</p>
                    <p className="text-xs text-slate-400 mb-6 leading-relaxed">加入後您接下來的<b className="text-[#1B2B5D]">編輯會即時同步</b>到房間。若這是旅伴已建立的房間，稍候即會載入內容；<b className="text-[#1B2B5D]">不會覆蓋</b>房間既有資料。</p>
                    <div className="flex gap-3">
                      <button onClick={() => setPendingJoin(null)} className="flex-1 bg-slate-100 text-slate-600 font-black py-3 rounded-2xl active:scale-95 transition-all uppercase tracking-widest leading-none">取消</button>
                      <button onClick={() => enterRoom(pendingJoin.code, false)} className="flex-1 bg-[#1B2B5D] text-white font-black py-3 rounded-2xl shadow-xl active:scale-95 transition-all uppercase tracking-widest leading-none">加入</button>
                    </div>
                  </>
                )}
              </div>
            </div>
          )}

          {/* 編輯天數標題/摘要 */}
          {editDayInfo && (
            <div className="absolute inset-0 z-[600] flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-md animate-in fade-in duration-300">
              <div className="bg-white w-full max-w-sm rounded-[2rem] p-8 shadow-2xl border-4 border-[#D1A44B] animate-in zoom-in-95">
                <div className="flex justify-between items-center mb-6">
                  <h3 className="text-xl font-serif font-bold uppercase font-black leading-none text-[#1B2B5D]">第 {editDayInfo.day} 天</h3>
                  <button onClick={() => setEditDayInfo(null)} className="bg-slate-100 p-2 rounded-full text-slate-400"><X size={20}/></button>
                </div>
                <div className="space-y-4">
                  <div><label className="text-[10px] font-black text-slate-400 mb-1 block uppercase tracking-widest leading-none">標題</label><input type="text" placeholder="例如：北部探索" className="w-full bg-[#F8F3E9] p-3 rounded-2xl text-sm font-bold outline-none border border-transparent focus:border-[#D1A44B]" value={editDayInfo.title} onChange={e=>setEditDayInfo({...editDayInfo,title:e.target.value})}/></div>
                  <div><label className="text-[10px] font-black text-slate-400 mb-1 block uppercase tracking-widest leading-none">摘要</label><textarea placeholder="本日行程概述..." className="w-full bg-[#F8F3E9] p-3 rounded-2xl text-xs h-20 outline-none resize-none border border-transparent focus:border-[#D1A44B]" value={editDayInfo.summary} onChange={e=>setEditDayInfo({...editDayInfo,summary:e.target.value})}/></div>

                  <div className="space-y-2 bg-[#FDFBF7] p-3 rounded-2xl border border-[#E9E1D3]">
                    <label className="text-[10px] font-black text-[#8E1E7E] uppercase tracking-widest leading-none flex items-center gap-1"><Plane size={12}/> 航班資訊 (選填)</label>
                    <div className="grid grid-cols-2 gap-2">
                      <select className="bg-white p-2.5 rounded-xl text-xs font-bold outline-none border border-[#E9E1D3] focus:border-[#8E1E7E] text-[#5A4D3D]" value={editDayInfo.flight?.label||''} onChange={e=>setEditDayInfo({...editDayInfo, flight:{...editDayInfo.flight, label:e.target.value}})}>
                        <option value="">類型</option><option value="去程">去程</option><option value="回程">回程</option><option value="轉機">轉機</option>
                      </select>
                      <input type="text" placeholder="航班號 MM922" className="bg-white p-2.5 rounded-xl text-xs font-bold outline-none border border-[#E9E1D3] focus:border-[#8E1E7E]" value={editDayInfo.flight?.no||''} onChange={e=>setEditDayInfo({...editDayInfo, flight:{...editDayInfo.flight, no:e.target.value}})}/>
                    </div>
                    <input type="text" placeholder="航空公司 樂桃航空" className="w-full bg-white p-2.5 rounded-xl text-xs font-bold outline-none border border-[#E9E1D3] focus:border-[#8E1E7E]" value={editDayInfo.flight?.airline||''} onChange={e=>setEditDayInfo({...editDayInfo, flight:{...editDayInfo.flight, airline:e.target.value}})}/>
                    <div className="grid grid-cols-2 gap-2">
                      <input type="text" placeholder="出發地 台北(桃園)" className="bg-white p-2.5 rounded-xl text-xs outline-none border border-[#E9E1D3] focus:border-[#8E1E7E]" value={editDayInfo.flight?.depCity||''} onChange={e=>setEditDayInfo({...editDayInfo, flight:{...editDayInfo.flight, depCity:e.target.value}})}/>
                      <input type="text" placeholder="抵達地 沖繩(那霸)" className="bg-white p-2.5 rounded-xl text-xs outline-none border border-[#E9E1D3] focus:border-[#8E1E7E]" value={editDayInfo.flight?.arrCity||''} onChange={e=>setEditDayInfo({...editDayInfo, flight:{...editDayInfo.flight, arrCity:e.target.value}})}/>
                      <input type="text" placeholder="出發 06/05 09:35" className="bg-white p-2.5 rounded-xl text-xs outline-none border border-[#E9E1D3] focus:border-[#8E1E7E]" value={editDayInfo.flight?.depTime||''} onChange={e=>setEditDayInfo({...editDayInfo, flight:{...editDayInfo.flight, depTime:e.target.value}})}/>
                      <input type="text" placeholder="抵達 06/05 12:20" className="bg-white p-2.5 rounded-xl text-xs outline-none border border-[#E9E1D3] focus:border-[#8E1E7E]" value={editDayInfo.flight?.arrTime||''} onChange={e=>setEditDayInfo({...editDayInfo, flight:{...editDayInfo.flight, arrTime:e.target.value}})}/>
                    </div>
                    <input type="text" placeholder="訂位代號 92GD5H" className="w-full bg-white p-2.5 rounded-xl text-xs font-bold outline-none border border-[#E9E1D3] focus:border-[#8E1E7E] uppercase" value={editDayInfo.flight?.pnr||''} onChange={e=>setEditDayInfo({...editDayInfo, flight:{...editDayInfo.flight, pnr:e.target.value}})}/>

                      <div className="flex items-center gap-2">
                        <img src={editDayInfo.flight.qr} className="h-12 w-12 object-cover rounded-lg border border-[#E9E1D3]" alt="QR"/>
                        <button onClick={()=>setEditDayInfo({...editDayInfo, flight:{...editDayInfo.flight, qr:''}})} className="text-[10px] text-red-500 font-bold">移除 QR</button>
                      </div>
                    ) : (
                      <label className="w-full bg-white border border-dashed border-[#E9E1D3] rounded-xl py-2.5 text-[10px] font-bold text-slate-400 cursor-pointer hover:border-[#8E1E7E] flex items-center justify-center gap-1">
                        <ImagePlus size={14}/> 上傳登機 QR 截圖
                        <input type="file" accept="image/*" className="hidden" onChange={e=>{ const file=e.target.files[0]; if(!file)return; readCompressedImage(file, url=>setEditDayInfo(prev=>({...prev, flight:{...prev.flight, qr:url}}))); }}/>
                      </label>
                    )}
                  </div>

                  <button onClick={saveDayInfo} className="w-full bg-[#1B2B5D] text-white font-black py-4 rounded-2xl shadow-xl active:scale-95 transition-all uppercase tracking-widest leading-none">儲存</button>
                </div>
              </div>
            </div>
          )}

          {/* 刪除天數確認 */}
          {delDay !== null && (
            <div className="absolute inset-0 z-[600] flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-md animate-in fade-in duration-300">
              <div className="bg-white w-full max-w-sm rounded-[2rem] p-8 shadow-2xl border-4 border-red-500 animate-in zoom-in-95 text-center">
                <AlertTriangle size={48} className="text-red-500 mx-auto mb-4"/>
                <h3 className="text-xl font-serif font-bold uppercase font-black leading-none text-[#1B2B5D] mb-2">刪除行程天數</h3>
                <p className="text-sm text-slate-500 mb-6 font-bold">確定要刪除「第 {delDay} 天」？<br/><span className="text-xs text-red-500">此操作無法還原。</span></p>
                <div className="flex gap-3">
                  <button onClick={() => setDelDay(null)} className="flex-1 bg-slate-100 text-slate-600 font-black py-3 rounded-2xl active:scale-95 transition-all uppercase tracking-widest leading-none">取消</button>
                  <button onClick={confirmDelDay} className="flex-1 bg-red-600 text-white font-black py-3 rounded-2xl shadow-xl active:scale-95 transition-all uppercase tracking-widest leading-none">確定刪除</button>
                </div>
              </div>
            </div>
          )}

          {/* 設定彈窗 */}
          {showCfg && (
            <div className="absolute inset-0 z-[600] flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-md animate-in fade-in duration-300">
              <div className="bg-white w-full max-w-sm rounded-[2rem] p-8 shadow-2xl border-4 border-amber-400 animate-in zoom-in-95">
                <div className="flex justify-between items-center mb-6">
                  <h3 className="text-xl font-serif font-bold uppercase font-black leading-none text-[#1B2B5D]">行程設定</h3>
                  <button onClick={() => setShowCfg(false)} className="bg-slate-100 p-2 rounded-full text-slate-400"><X size={20}/></button>
                </div>
                <div className="space-y-4">
                  <div><label className="text-[10px] font-black text-slate-400 mb-1 block uppercase tracking-widest leading-none">目的地</label><input type="text" className="w-full bg-[#F8F3E9] p-3 rounded-2xl text-sm font-bold outline-none border border-transparent focus:border-amber-400" value={settings.title} onChange={e=>setSettings({...settings,title:e.target.value})}/></div>
                  <div className="grid grid-cols-2 gap-3">
                    <div><label className="text-[10px] font-black text-slate-400 mb-1 block">年份</label><input type="text" className="w-full bg-[#F8F3E9] p-3 rounded-2xl text-sm font-bold outline-none border border-transparent focus:border-amber-400" value={settings.year} onChange={e=>setSettings({...settings,year:e.target.value})}/></div>
                    <div><label className="text-[10px] font-black text-slate-400 mb-1 block">月份</label><input type="text" className="w-full bg-[#F8F3E9] p-3 rounded-2xl text-sm font-bold outline-none border border-transparent focus:border-amber-400" value={settings.month} onChange={e=>setSettings({...settings,month:e.target.value})}/></div>
                  </div>
                  <div><label className="text-[10px] font-black text-slate-400 mb-1 block uppercase tracking-widest">貨幣</label>
                    <select className="w-full bg-[#F8F3E9] p-3 rounded-2xl text-sm font-bold outline-none border border-transparent focus:border-amber-400" value={settings.currency} onChange={e=>setSettings({...settings,currency:e.target.value})}>
                      {CURRENCIES.map(c=><option key={c.code} value={c.code}>{c.code} - {c.name}</option>)}
                    </select>
                  </div>
                  <button onClick={() => { saveSettings(settings); setShowCfg(false); showToast("設定已儲存"); }} className="w-full bg-[#1B2B5D] text-white font-black py-4 rounded-2xl shadow-xl active:scale-95 transition-all uppercase tracking-widest leading-none">儲存設定</button>
                </div>
              </div>
            </div>
          )}

          {/* 附件圖片 */}
          {attachment && (
            <div className="fixed inset-0 z-[500] bg-black/95 flex flex-col items-center justify-center p-4 backdrop-blur-md animate-in fade-in">
              <div className="w-full max-w-md flex justify-between items-center mb-4 text-white">
                <h3 className="text-lg font-serif font-bold flex items-center gap-2 uppercase font-black leading-none"><Paperclip className="text-blue-400" size={20}/> 附件檢視</h3>
                <button onClick={() => { setAttachment(null); setZoom(1); }} className="bg-white/10 p-2 rounded-full leading-none flex items-center justify-center"><X size={24}/></button>
              </div>
              <div className="relative w-full flex-1 overflow-hidden rounded-3xl bg-white/5 flex items-center justify-center border border-white/10 shadow-2xl">
                <div className="w-full h-full overflow-auto no-scrollbar flex items-center justify-center">
                  <img src={attachment} alt="Attachment" className="max-w-none transition-transform duration-200" style={{transform:`scale(${zoom})`,transformOrigin:'center center'}} onError={e=>{e.target.src="https://images.unsplash.com/photo-1544551763-46a013bb70d5?auto=format&fit=crop&q=80&w=1000";}}/>
                </div>
                <div className="absolute right-4 bottom-4 flex flex-col gap-2">
                  <button onClick={() => setZoom(p=>Math.min(p+0.5,4))} className="bg-white text-slate-900 p-4 rounded-2xl shadow-2xl active:scale-90 transition-transform h-[56px] w-[56px] flex items-center justify-center"><ZoomIn size={26}/></button>
                  <button onClick={() => setZoom(p=>Math.max(p-0.5,1))} className="bg-white text-slate-900 p-4 rounded-2xl shadow-2xl active:scale-90 transition-transform h-[56px] w-[56px] flex items-center justify-center"><ZoomOut size={26}/></button>
                  <button onClick={() => setZoom(1)} className="bg-blue-600 text-white p-4 rounded-2xl shadow-2xl active:scale-90 transition-transform h-[56px] w-[56px] flex items-center justify-center"><Maximize2 size={26}/></button>
                </div>
              </div>
            </div>
          )}

          {/* 底部導覽 */}
          <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/95 backdrop-blur-xl border-t border-[#E9E1D3] flex justify-around p-1 pb-4 z-40">
            {[
              { id:'itinerary', icon:<MapPin size={18}/>,     label:'PLAN'  },
              { id:'expenses',  icon:<Wallet size={18}/>,     label:'MONEY' },
              { id:'lists',     icon:<ListChecks size={18}/>, label:'CHECK' },
              { id:'transport', icon:<Train size={18}/>,      label:'TRANS' },
              { id:'info',      icon:<Info size={18}/>,       label:'TIPS'  },
              { id:'funpass',   icon:<Ticket size={18}/>,     label:'PASS'  },
            ].map(tab => (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                className={`flex flex-col items-center gap-0.5 transition-all px-1.5 py-1 rounded-xl ${activeTab===tab.id ? 'text-[#1B2B5D] bg-[#1B2B5D]/5' : 'text-[#A69984]'}`}>
                <div className={activeTab===tab.id ? 'scale-110 -translate-y-px transition-transform' : 'scale-100 transition-transform'}>{tab.icon}</div>
                <span className="text-[6px] font-black tracking-[0.1em] uppercase leading-none">{tab.label}</span>
              </button>
            ))}
          </nav>

          {/* 新增/修改行程彈窗 */}
          {(showAdd || editing) && (
            <div className="absolute inset-0 z-[300] flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-md animate-in fade-in duration-300">
              <div className={`bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl border-4 ${editing ? 'border-[#B91C1C]' : 'border-[#1B2B5D]'} animate-in zoom-in-95`}>
                <div className="flex justify-between items-center mb-6">
                  <h3 className={`text-xl font-serif font-bold uppercase font-black leading-none ${editing ? 'text-[#B91C1C]' : 'text-[#1B2B5D]'}`}>{editing ? '修改行程' : '新增行程'}</h3>
                  <button onClick={() => { setShowAdd(false); setEditing(null); }} className="bg-slate-100 p-2 rounded-full text-slate-400 hover:text-red-500 transition-colors shadow-sm leading-none flex items-center justify-center"><X size={20}/></button>
                </div>
                <div className="space-y-4 overflow-y-auto max-h-[70vh] no-scrollbar">
                  <div className="grid grid-cols-2 gap-3">
                    <input type="time" className="bg-[#F8F3E9] p-3 rounded-2xl text-sm outline-none font-bold shadow-inner"
                      value={editing ? editing.time : newSpot.time}
                      onChange={e => editing ? setEditing({...editing,time:e.target.value}) : setNewSpot({...newSpot,time:e.target.value})}/>
                    <select className="bg-[#F8F3E9] p-3 rounded-2xl text-sm outline-none font-bold text-[#5A4D3D] shadow-inner"
                      value={editing ? editing.type : newSpot.type}
                      onChange={e => editing ? setEditing({...editing,type:e.target.value}) : setNewSpot({...newSpot,type:e.target.value})}>
                      <option value="view">景點</option><option value="food">美食</option><option value="shopping">購物</option>
                      <option value="park">公園</option><option value="transport">交通</option><option value="hotel">住宿</option>
                    </select>
                  </div>
                  <input type="text" placeholder="名稱" className="w-full bg-[#F8F3E9] p-3 rounded-2xl text-sm font-bold outline-none border border-transparent focus:border-[#D1A44B] shadow-inner"
                    value={editing ? editing.name : newSpot.name}
                    onChange={e => editing ? setEditing({...editing,name:e.target.value}) : setNewSpot({...newSpot,name:e.target.value})}/>
                  <div className="relative">
                    <input type="text" placeholder="Mapcode" className="w-full bg-[#F8F3E9] p-3 rounded-2xl text-sm font-bold outline-none border border-transparent focus:border-[#D1A44B] pl-10 shadow-inner"
                      style={{fontFamily:MS_JH}}
                      value={editing ? (editing.mapcode||'') : newSpot.mapcode}
                      onChange={e => editing ? setEditing({...editing,mapcode:e.target.value}) : setNewSpot({...newSpot,mapcode:e.target.value})}/>
                    <Hash size={16} className="absolute left-3 top-3.5 text-[#D1A44B]"/>
                  </div>
                  <textarea placeholder="備註內容..." className="w-full bg-[#F8F3E9] p-3 rounded-2xl text-xs h-20 outline-none resize-none shadow-inner"
                    value={editing ? editing.note : newSpot.note}
                    onChange={e => editing ? setEditing({...editing,note:e.target.value}) : setNewSpot({...newSpot,note:e.target.value})}/>

                  <div className="space-y-2 bg-[#FDFBF7] p-3 rounded-2xl border border-[#E9E1D3]">
                    <label className="text-[10px] font-black text-[#B91C1C] uppercase tracking-widest leading-none flex items-center gap-1"><Paperclip size={12}/> 附件 (圖片網址 / 本機圖片)</label>
                    {(editing ? editing.attachment : newSpot.attachment) ? (
                      <div className="relative inline-block w-full">
                        <img src={editing ? editing.attachment : newSpot.attachment} className="h-24 w-full object-cover rounded-xl border border-[#E9E1D3]" alt="Preview"/>
                        <button onClick={() => editing ? setEditing({...editing,attachment:''}) : setNewSpot({...newSpot,attachment:''})} className="absolute top-2 right-2 bg-black/60 text-white p-1.5 rounded-full backdrop-blur-sm hover:bg-red-500 transition-colors"><X size={14}/></button>
                      </div>
                    ) : (
                      <div className="flex gap-2 items-center">
                        <input type="text" placeholder="貼上圖片網址..." className="flex-1 bg-white p-2.5 rounded-xl text-xs outline-none border border-[#E9E1D3] focus:border-[#D1A44B] shadow-inner"
                          value={(editing ? editing.attachment : newSpot.attachment) || ''}
                          onChange={e => editing ? setEditing({...editing,attachment:e.target.value}) : setNewSpot({...newSpot,attachment:e.target.value})}/>
                        <span className="text-[10px] text-slate-300 font-bold uppercase shrink-0">OR</span>
                        <label className="bg-[#1B2B5D] text-white px-3 py-2.5 rounded-xl cursor-pointer hover:bg-blue-700 transition-colors flex items-center justify-center shrink-0 shadow-md">
                          <ImagePlus size={16}/>
                          <input type="file" accept="image/*" className="hidden" onChange={e => handleImageUpload(e, editing ? setEditing : setNewSpot, editing || newSpot)}/>
                        </label>
                      </div>
                    )}
                  </div>

                  <button onClick={editing ? saveEditSpot : addSpot}
                    className={`w-full ${editing?'bg-[#B91C1C]':'bg-[#1B2B5D]'} text-white font-black py-4 rounded-2xl shadow-xl active:scale-95 transition-all uppercase tracking-widest leading-none h-[48px] flex items-center justify-center`}>
                    {editing ? '確認修改' : '儲存行程點'}
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
